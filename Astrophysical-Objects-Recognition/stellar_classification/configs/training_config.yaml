# Training configuration for stellar classification pipeline

data:
  target_col: class
  test_size: 0.2
  val_ratio: 0.25
  random_state: 42

preprocessing:
  random_state_smote: 1
  outlier_iqr_multiplier: 1.5

models:
  neural:
    input_hidden: 128
    num_epochs: 10
    lr: 0.001
    batch_size: 64

evaluation:
  permutation:
    n_repeats: 10
    random_state: 42
  shap:
    background_size: 100
    subset_size: 100
